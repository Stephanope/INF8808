<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Heatmap Component</title>
    <style>
      body { 
        background-color: #2b2b2b; 
        color: #fff; 
        font-family: sans-serif; 
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #heatmap-container {
        width: 100%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .viz-block {
        width: 100%;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="heatmap-wrapper">
      <div class="viz-block">
          <div id="heatmap-revenue" style="margin-top: 20px;"
            role="img"
            aria-label="Carte de chaleur des revenus. Les mois de mai à juillet sont nettement les plus rentable de l'année avec également une remonté en décembre, tandis que les mois d'hiver et de début de printemps sont plus calmes.">
          </div>
      </div>
      <div class="viz-block" style="margin-top: 50px;"
        role="img"
        aria-label="Carte de chaleur des notes. Il n'y a visiblement pas de tendance saisonnière claire dans les notes, ce qui suggère que la qualité perçue des films n'est pas fortement influencée par le mois de sortie.">
        <div id="heatmap-vote"></div>
      </div>
      <div class="viz-block" style="margin-top: 50px;"
        role="img"
        aria-label="Carte de chaleur du nombre de films. Les sorties sont stables toute l'année, à l'exeption de forts pics en authomne et en fin d'année, probablement liés par la production de films thématiques d'Halloween et des fêtes.">
        <div id="heatmap-count"></div>
      </div>
    </div>

    <script type="module" src="./heatmap/heatmap.js"></script>

    <script>
      function updateHeight() {
        const height = document.body.scrollHeight;
        window.parent.postMessage({ type: 'iframe-height', height: height }, '*');
      }
      window.addEventListener('load', updateHeight);
      new ResizeObserver(updateHeight).observe(document.body);
    </script>
  </body>
</html>
