<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies Dorling Map | INF8808</title>

    <link rel="stylesheet" href="assets/typography.css" />
    <link rel="stylesheet" href="assets/dorling.css" />
  </head>

  <body class="dorling-page">
    <main class="dorling-shell">
      <div id="dorling-map" class="dorling-map" role="img" aria-label="Carte de Dorling interactive représentant la répartition géographique de la production cinématographique mondiale. Chaque bulle est positionnée sur le pays de production correspondant. La taille d'une bulle est proportionnelle au nombre de films produits ; la couleur encode soit les revenus moyens par film, soit la note moyenne, selon le mode sélectionné. En mode Revenus, la couleur va du blanc (faibles revenus) au rouge foncé (jusqu'à environ 200 millions de dollars par film). En mode Notes, elle va du blanc (environ 5 sur 10) au rouge foncé (jusqu'à 10 sur 10). Points clés à retenir : premièrement, la production cinématographique mondiale est très inégalement répartie — les États-Unis écrasent tous les autres pays avec 6 760 films produits, soit une bulle bien plus grande que tous les autres pays réunis. Deuxièmement, l'Europe forme un cluster dense mais nettement plus modeste, dominé par le Royaume-Uni, l'Allemagne, la France et l'Espagne. Troisièmement, malgré leur volume de production, les États-Unis n'affichent qu'une note moyenne de 6,47 sur 10, ce qui suggère que quantité et qualité perçue ne vont pas toujours de pair. Quatrièmement, en mode Revenus, la plupart des pays hors États-Unis apparaissent blancs ou très pâles, révélant que les revenus élevés restent l'exception et non la règle à l'échelle mondiale. Cinquièmement, l'hémisphère sud (Amérique du Sud, Afrique, Océanie) est quasi absent de la carte, soulignant la concentration de l'industrie dans l'hémisphère nord. Un clic sur une bulle affiche les statistiques détaillées du pays et ses cinq films les plus rentables."></div>
    </main>

    <script type="module" src="scripts/dorling-main.js"></script>
    <script>
      const MIN_IFRAME_HEIGHT = 500;
      const MAX_IFRAME_HEIGHT = 640;

      function updateIframeHeight() {
        const rawHeight = document.documentElement.scrollHeight;
        const height = Math.max(
          MIN_IFRAME_HEIGHT,
          Math.min(rawHeight, MAX_IFRAME_HEIGHT),
        );
        window.parent.postMessage(
          {
            type: "iframe-height",
            height,
          },
          "*",
        );
      }

      const observer = new ResizeObserver(() => {
        updateIframeHeight();
      });

      observer.observe(document.body);

      window.addEventListener("load", () => {
        updateIframeHeight();
      });

      setTimeout(() => {
        updateIframeHeight();
      }, 250);
    </script>
  </body>
</html>
