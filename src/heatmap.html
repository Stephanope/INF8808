<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Heatmap Component</title>
    <style>
        body { 
          background-color: #2b2b2b; 
          color: #fff; 
          font-family: sans-serif; 
          margin: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        #heatmap-container {
          width: 100%;
          max-width: 1200px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .viz-block {
          width: 100%;
          display: flex;
          justify-content: center;
        }
    </style>
  </head>
  <body>
    <div id="heatmap-wrapper">
        <div class="viz-block">
            <div id="heatmap-revenue" style="margin-top: 20px;"></div>
        </div>
        <div class="viz-block" style="margin-top: 50px;">
            <div id="heatmap-vote"></div>
        </div>
        <div class="viz-block" style="margin-top: 50px;">
            <div id="heatmap-count"></div>
        </div>
    </div>

    <script type="module" src="./heatmap/heatmap.js"></script>

    <script>
      function updateHeight() {
        const height = document.body.scrollHeight;
        window.parent.postMessage({ type: 'iframe-height', height: height }, '*');
      }
      window.addEventListener('load', updateHeight);
      new ResizeObserver(updateHeight).observe(document.body);
    </script>
  </body>
</html>
